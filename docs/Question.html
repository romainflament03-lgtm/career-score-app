<!DOCTYPE html>
<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Questionnaire Interactif - JobPulse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#36a4f2",
                        "accent": "#10b981",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "card": "2.5rem",
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            input[type="range"] {
                @apply appearance-none bg-transparent cursor-pointer w-full;
            }
            input[type="range"]::-webkit-slider-runnable-track {
                @apply h-3 rounded-full bg-gradient-to-r from-slate-200 via-primary to-accent;
            }
            input[type="range"]::-webkit-slider-thumb {
                @apply appearance-none h-8 w-8 rounded-full bg-white border-4 border-primary shadow-lg -mt-[10px] transition-transform active:scale-110;
            }
            input[type="range"]::-moz-range-track {
                @apply h-3 rounded-full bg-gradient-to-r from-slate-200 via-primary to-accent;
            }
            input[type="range"]::-moz-range-thumb {
                @apply h-8 w-8 rounded-full bg-white border-4 border-primary shadow-lg border-none transition-transform active:scale-110;
            }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden">
<div class="fixed top-0 left-0 w-full h-1.5 bg-slate-100 dark:bg-slate-800 z-50">
<div class="h-full bg-primary transition-all duration-700 ease-out" style="width: 30%;"></div>
</div>
<div class="relative flex min-h-screen w-full flex-col">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-accent/10 blur-[120px] rounded-full"></div>
<header class="flex items-center justify-between px-6 md:px-20 py-6 z-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl font-bold">pulse_alert</span>
<h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">JobPulse</h2>
</div>
<div class="text-slate-400 text-sm font-semibold tracking-widest uppercase">Question 3/10</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 z-10">
<div class="w-full max-w-xl bg-white dark:bg-slate-900 rounded-card shadow-[0_20px_50px_rgba(0,0,0,0.08)] dark:shadow-[0_20px_50px_rgba(0,0,0,0.3)] p-10 md:p-16 flex flex-col items-center text-center transform transition-all">
<div class="mb-8 p-4 bg-primary/5 rounded-2xl">
<span class="material-symbols-outlined text-primary text-4xl">psychology</span>
</div>
<h1 class="text-slate-800 dark:text-white text-2xl md:text-3xl font-bold leading-tight mb-12">
                    Je me sens satisfait de mes missions quotidiennes
                </h1>
<div class="w-full px-2">
<input class="mb-6" max="5" min="1" step="1" type="range" value="3"/>
<div class="flex justify-between w-full px-1">
<div class="flex flex-col items-center gap-2">
<span class="text-xs font-bold text-slate-400 uppercase tracking-tighter">1</span>
<span class="text-sm font-medium text-slate-500">Pas du tout</span>
</div>
<div class="flex flex-col items-center gap-2">
<span class="text-xs font-bold text-slate-400 uppercase tracking-tighter">5</span>
<span class="text-sm font-medium text-slate-500">Tout à fait</span>
</div>
</div>
</div>
</div>
</main>
<footer class="flex flex-col items-center justify-center pb-12 pt-4 px-6 z-20">
<div class="w-full max-w-md flex flex-col gap-4">
<button class="group w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-5 px-8 rounded-full shadow-2xl hover:shadow-primary/20 hover:scale-[1.02] transition-all flex items-center justify-center gap-3">
<span class="text-lg">Suivant</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
<button class="text-slate-400 dark:text-slate-500 text-sm font-medium hover:text-primary transition-colors py-2">
                    Passer cette question pour l'instant
                </button>
</div>
</footer>
</div>

</body></html>
